<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>YT Music</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap');

    :root {
      --titlebar-height : 44px;
      --traffic-w       : 76px;   /* macOS: space reserved for traffic lights */
      --bg              : #0a0a0a;
      --border          : #1e1e1e;
      --text            : #e8e8e8;
      --muted           : #a0a0a0;
      --red             : #ff0033;
      --hover           : rgba(255,255,255,.07);
      --active          : rgba(255,255,255,.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: var(--titlebar-height);
      overflow: hidden;
      background: var(--bg);
      font-family: 'Google Sans', -apple-system, sans-serif;
      color: var(--text);
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ────────────────────────────────────────────
       TITLE BAR  — three-zone flex layout
       [mac-spacer | logo+nav | title | actions+win]
    ──────────────────────────────────────────── */
    #bar {
      display: flex;
      align-items: center;
      height: 100%;
      border-bottom: 1px solid var(--border);
    }

    /* Zone 1 – left  */
    #zone-left {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-left: 10px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    /* macOS spacer: leave room for native traffic lights */
    #mac-spacer {
      display: none;
      width: var(--traffic-w);
      -webkit-app-region: drag;   /* keep it draggable */
    }

    /* Zone 2 – center (flexible, draggable) */
    #zone-center {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-app-region: drag;
    }
    #title-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 380px;
      -webkit-app-region: drag;
    }

    /* Zone 3 – right */
    #zone-right {
      display: flex;
      align-items: center;
      gap: 2px;
      padding-right: 6px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    /* ── Logo ── */
    #logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 4px;
    }
    #logo-svg  { width: 22px; height: 22px; flex-shrink: 0; }
    #app-name  { font-size: 13px; font-weight: 500; letter-spacing: .2px; }

    .sep {
      width: 1px; height: 18px;
      background: var(--border);
      margin: 0 4px; flex-shrink: 0;
    }

    /* ── All buttons base ── */
    button {
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent;
      color: var(--text);
      cursor: pointer; flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    button:hover:not(:disabled) { background: var(--hover); color: var(--text); }
    button:active:not(:disabled){ background: var(--active); }
    button:disabled              { opacity: .28; cursor: default; }

    /* ── Nav buttons ── */
    .nav-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
    }
    .nav-btn svg { width: 14px; height: 14px; }

    /* ── Reload (spins when loading) ── */
    #reload-btn { width: 30px; height: 30px; border-radius: 50%; }
    #reload-btn svg { width: 14px; height: 14px; }
    #reload-btn.spinning svg { animation: spin .55s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Action buttons (sign-out etc.) ── */
    .action-btn { width: 30px; height: 30px; border-radius: 6px; }
    .action-btn svg { width: 14px; height: 14px; }

    /* ────────────────────────────────────────────
       WINDOWS window-control buttons  (right side)
       Spotify/Chrome style: ─   □   ✕
    ──────────────────────────────────────────── */
    #win-controls {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: 6px;
    }
    .wc-btn {
      width: 46px;
      height: var(--titlebar-height);
      border-radius: 0;
      font-size: 10px;
    }
    .wc-btn svg { width: 10px; height: 10px; }
    #wc-min:hover  { background: rgba(255,255,255,.1); color: #fff; }
    #wc-max:hover  { background: rgba(255,255,255,.1); color: #fff; }
    #wc-close:hover{ background: #e81123; color: #fff; }

    /* macOS: hide Windows controls; show mac-spacer */
    .platform-darwin #win-controls { display: none; }
    .platform-darwin #mac-spacer   { display: block; }

    /* ── Error banner ── */
    #error-banner {
      position: fixed;
      top: var(--titlebar-height); left: 0; right: 0;
      background: #1a0000;
      border-bottom: 1px solid #5c0000;
      color: #ff8080;
      font-size: 12px;
      padding: 7px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 999;
    }
    #error-banner.visible { display: flex; }
    #err-retry {
      margin-left: auto;
      padding: 3px 12px;
      background: var(--red); color: #fff;
      border-radius: 4px; font-size: 11px;
    }
    #err-retry:hover { background: #cc0022; color: #fff; }
  </style>
</head>
<body>

<div id="bar">

  <!-- ── LEFT zone ── -->
  <div id="zone-left">

    <!-- macOS: blank space for native traffic lights -->
    <div id="mac-spacer"></div>

    <!-- Logo + name -->
    <div id="logo-wrap">
      <svg id="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#FF0033"/>
        <circle cx="24" cy="24" r="11" fill="rgba(255,255,255,.15)"/>
        <circle cx="24" cy="24" r="7"  fill="white"/>
        <circle cx="24" cy="24" r="3"  fill="#FF0033"/>
        <path d="M22 17.5 L33 24 L22 30.5 Z" fill="white"/>
      </svg>
      <span id="app-name">YT Music</span>
    </div>

    <div class="sep"></div>

    <!-- Nav -->
    <button class="nav-btn" id="btn-back"    title="Back"    disabled>
      <svg viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nav-btn" id="btn-forward" title="Forward" disabled>
      <svg viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nav-btn" id="btn-home"    title="Home">
      <svg viewBox="0 0 14 14" fill="none"><path d="M1.5 7L7 1.5 12.5 7V13a.5.5 0 01-.5.5H9.25v-3H4.75v3H2a.5.5 0 01-.5-.5V7z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
    </button>
    <button id="reload-btn" title="Reload">
      <svg viewBox="0 0 14 14" fill="none">
        <path d="M12 7A5 5 0 112 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M12 3.5V7H8.5"     stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div><!-- /zone-left -->

  <!-- ── CENTER zone (draggable title) ── -->
  <div id="zone-center">
    <span id="title-text">YouTube Music</span>
  </div>

  <!-- ── RIGHT zone ── -->
  <div id="zone-right">

    <!-- Sign out -->
    <button class="action-btn" id="btn-signout" title="Sign out / clear session">
      <svg viewBox="0 0 14 14" fill="none">
        <path d="M5.5 2H2.5a1 1 0 00-1 1v8a1 1 0 001 1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M9.5 4.5L13 7l-3.5 3M13 7H5.5"           stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Windows window controls: min / max / close -->
    <div id="win-controls">
      <button class="wc-btn" id="wc-min" title="Minimize">
        <svg viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="wc-btn" id="wc-max" title="Maximize">
        <svg viewBox="0 0 10 10" id="max-icon">
          <rect x=".75" y=".75" width="8.5" height="8.5" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
        </svg>
      </button>
      <button class="wc-btn" id="wc-close" title="Close">
        <svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>

  </div><!-- /zone-right -->

</div><!-- /bar -->

<!-- Error banner (sits just below the title bar) -->
<div id="error-banner">
  <span id="err-msg">⚠ Can't connect to YouTube Music. Check your connection.</span>
  <button id="err-retry">Retry</button>
</div>

<script>
  const api = window.electronAPI;

  // Apply platform class – hides Windows buttons on macOS, shows mac spacer
  document.body.classList.add('platform-' + api.platform);

  // ── Refs ──
  const btnBack    = document.getElementById('btn-back');
  const btnFwd     = document.getElementById('btn-forward');
  const btnHome    = document.getElementById('btn-home');
  const reloadBtn  = document.getElementById('reload-btn');
  const titleText  = document.getElementById('title-text');
  const errBanner  = document.getElementById('error-banner');
  const errMsg     = document.getElementById('err-msg');
  const btnSignout = document.getElementById('btn-signout');
  const errRetry   = document.getElementById('err-retry');
  const wcMin      = document.getElementById('wc-min');
  const wcMax      = document.getElementById('wc-max');
  const wcClose    = document.getElementById('wc-close');
  const maxIcon    = document.getElementById('max-icon');

  // ── Window controls (Windows) ──
  wcMin.addEventListener('click',   () => api.minimize());
  wcMax.addEventListener('click',   () => api.maximize());
  wcClose.addEventListener('click', () => api.close());

  // ── Nav ──
  btnBack.addEventListener('click',   () => api.navBack());
  btnFwd.addEventListener('click',    () => api.navForward());
  btnHome.addEventListener('click',   () => api.navHome());
  reloadBtn.addEventListener('click', () => api.navReload());

  // ── Sign out ──
  btnSignout.addEventListener('click', () => {
    if (confirm('Sign out of YouTube Music?\n\nYour session will be cleared and you\'ll need to sign in again.')) {
      api.signOut();
    }
  });

  errRetry.addEventListener('click', () => {
    errBanner.classList.remove('visible');
    api.navReload();
  });

  // ── Events from main process ──
  api.on('loading', isLoading => {
    reloadBtn.classList.toggle('spinning', isLoading);
    reloadBtn.title = isLoading ? 'Loading…' : 'Reload';
  });

  api.on('nav-state', ({ canBack, canForward }) => {
    btnBack.disabled = !canBack;
    btnFwd.disabled  = !canForward;
  });

  api.on('title-changed', title => {
    titleText.textContent = title || 'YouTube Music';
  });

  api.on('load-error', ({ errCode }) => {
    errMsg.textContent = `⚠ Connection error (${errCode}). Check your internet.`;
    errBanner.classList.add('visible');
  });

  api.on('maximized', isMax => {
    // Swap max button icon: restore icon when maximized
    maxIcon.innerHTML = isMax
      ? '<path d="M1 3.5h6.5v6H1z M3.5 1h6v6" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linejoin="round"/>'
      : '<rect x=".75" y=".75" width="8.5" height="8.5" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>';
    wcMax.title = isMax ? 'Restore' : 'Maximize';
  });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    const mod = e.ctrlKey || e.metaKey;
    if (mod && e.key === 'ArrowLeft')               { e.preventDefault(); api.navBack(); }
    if (mod && e.key === 'ArrowRight')              { e.preventDefault(); api.navForward(); }
    if (mod && (e.key === 'r' || e.key === 'R'))    { e.preventDefault(); api.navReload(); }
    if (e.key === 'F5')  api.navReload();
    if (e.key === 'F12') api.openDevTools();
  });
</script>
</body>
</html>
